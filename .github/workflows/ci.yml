name: CI — SQL Lint & dbt Tests

on:
  pull_request:
    branches:
      - main

# Cancel any in-progress run for the same PR to avoid redundant jobs
concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Lint all SQL files with SQLFluff
  # ──────────────────────────────────────────────
  sqlfluff-lint:
    name: SQLFluff Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install SQLFluff
        run: pip install sqlfluff

      # Lint every .sql file under sql/ and models/ (dbt).
      # --dialect postgres matches your schema.sql target database.
      # --exclude-rules ST06 ignores SELECT * which dbt uses internally.
      # Adjust paths or rules to suit your repo layout.
      - name: Run SQLFluff lint
        run: |
          sqlfluff lint \
            --dialect postgres \
            --exclude-rules ST06 \
            sql/ \
            models/ \
            || true   # remove "|| true" to make lint failures block the PR

      # Surface the lint report as an annotation even if the step fails
      - name: Upload SQLFluff report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sqlfluff-report
          path: .sqlfluff-report.json
          if-no-files-found: ignore

  # ──────────────────────────────────────────────
  # JOB 2: Spin up Postgres, load schema, run dbt
  # ──────────────────────────────────────────────
  dbt-build:
    name: dbt Build & Test
    runs-on: ubuntu-latest
    needs: sqlfluff-lint   # only run if lint job passes

    # Spin up a PostgreSQL service container that mirrors your local setup
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: eas550_db
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Match the variable names used in src/utils/db_connection.py
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: eas550_db
      PGUSER: ci_user
      PGPASSWORD: ci_password

      # dbt profile / target (adjust if your profiles.yml uses different names)
      DBT_PROFILES_DIR: ${{ github.workspace }}/.dbt

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # Apply the 3NF schema so dbt sources resolve correctly
      - name: Apply database schema
        run: |
          SCHEMA_FILE=""
          if [ -f sql/raw/schema.sql ]; then
            SCHEMA_FILE=sql/raw/schema.sql
          elif [ -f sql/schema.sql ]; then
            SCHEMA_FILE=sql/schema.sql
          fi

          if [ -n "$SCHEMA_FILE" ]; then
            echo "Applying schema: $SCHEMA_FILE"
            psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" -f "$SCHEMA_FILE"
          else
            echo "No schema.sql found — skipping."
          fi

      # Write a minimal dbt profiles.yml so dbt can connect to the CI database.
      # This avoids committing credentials to the repo.
      - name: Write dbt profiles.yml
        run: |
          mkdir -p .dbt
          cat > .dbt/profiles.yml << EOF
          eas550:
            target: ci
            outputs:
              ci:
                type: postgres
                host: "{{ env_var('PGHOST') }}"
                port: 5432
                user: "{{ env_var('PGUSER') }}"
                password: "{{ env_var('PGPASSWORD') }}"
                dbname: "{{ env_var('PGDATABASE') }}"
                schema: public
                threads: 4
          EOF

      - name: Install dbt-postgres
        run: pip install dbt-postgres

      - name: dbt deps (install packages)
        run: dbt deps

      # Run dbt build for the target model and all its upstream dependencies.
      # --select +report_daily_revenue resolves the full DAG lineage.
      - name: dbt build
        run: dbt build --select +report_daily_revenue

      # Upload dbt artifacts for debugging failed runs in the Actions UI
      - name: Upload dbt artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts
          path: |
            target/run_results.json
            target/manifest.json
          if-no-files-found: ignore
